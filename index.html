<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demos</title>
    <style>
      :root {
        --bg: #05070a;
        --panel: #0c1118;
        --line: #1c2733;
        --accent: #4cf3ff;
        --accent-dim: #1d8b96;
        --text: #d6f4f7;
        --text-dim: #6f8894;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Consolas", "SF Mono", "Courier New", monospace;
        color: var(--text);
        background:
          linear-gradient(var(--bg), var(--bg)),
          repeating-linear-gradient(
            0deg,
            rgba(76, 243, 255, 0.05) 0px,
            rgba(76, 243, 255, 0.05) 1px,
            transparent 1px,
            transparent 40px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(76, 243, 255, 0.05) 0px,
            rgba(76, 243, 255, 0.05) 1px,
            transparent 1px,
            transparent 40px
          );
        background-color: var(--bg);
      }

      main {
        width: min(600px, 90vw);
        padding: 32px;
      }

      .eyebrow {
        font-size: 0.75rem;
        letter-spacing: 0.4em;
        color: var(--accent-dim);
        margin: 0 0 8px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        margin: 0 0 28px;
        color: var(--accent);
        text-shadow: 0 0 12px rgba(76, 243, 255, 0.5);
        text-transform: uppercase;
      }

      .demos {
        display: grid;
        gap: 14px;
      }

      .demo-card {
        position: relative;
        display: block;
        padding: 18px 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        color: inherit;
        text-decoration: none;
        clip-path: polygon(
          0 0,
          calc(100% - 14px) 0,
          100% 14px,
          100% 100%,
          14px 100%,
          0 calc(100% - 14px)
        );
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }

      .demo-card:hover {
        border-color: var(--accent);
        box-shadow: 0 0 18px rgba(76, 243, 255, 0.25);
        transform: translateX(4px);
      }

      .demo-card h2 {
        margin: 0 0 4px;
        font-size: 1rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text);
      }

      .demo-card h2::before {
        content: "> ";
        color: var(--accent);
      }

      .demo-card p {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Select simulation</p>
      <h1>Demos</h1>
      <div class="demos">
        <a class="demo-card" href="tactics/">
          <h2>Tactics</h2>
          <p>Tactical grid combat prototype.</p>
        </a>
        <a class="demo-card" href="slay-the-tower/">
          <h2>Slay the Emojis</h2>
          <p>Deckbuilding roguelike, one floor at a time.</p>
        </a>
      </div>
    </main>
  </body>
</html>
